services:
  infra-agent:
    image: paueron/infra-agent:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - infra-agent-data:/app/backend/data
    environment:
      # Set this to the URL you use to reach the app (e.g. http://your-server-ip:8080)
      CORS_ORIGINS: "http://localhost:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  infra-agent-data:
